modules:
  confluence:spaceSettings:
    - key: riffle-sync-settings
      route: riffle-sync
      title: Riffle Sync
      render: native
      resolver:
        function: spaceSettingsResolver

  trigger:
    - key: on-page-created
      function: onPageEvent
      events:
        - abi:confluence:created:page
    - key: on-page-updated
      function: onPageEvent
      events:
        - abi:confluence:updated:page
    - key: on-page-removed
      function: onPageEvent
      events:
        - abi:confluence:removed:page

  function:
    - key: onPageEvent
      handler: src/triggers.handler
    - key: spaceSettingsResolver
      handler: src/resolvers.handler

permissions:
  scopes:
    - storage:app
    - read:confluence-content.all
  external:
    fetch:
      backend:
        - https://api.github.com

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/TBD
  name: Riffle
